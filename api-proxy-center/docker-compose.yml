services:
  new-api:
    image: calciumion/new-api:latest
    container_name: api-proxy-center
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    environment:
      # SQLite 模式，轻量无需额外数据库
      - SQL_DSN=
      # 初始 root 密码（首次登录后请修改）
      - INITIAL_ROOT_TOKEN=sk-proxy-center-admin-123456
      # 会话密钥
      - SESSION_SECRET=random-session-secret-change-me
      # 启用批量更新（提升性能）
      - BATCH_UPDATE_ENABLED=true
      - BATCH_UPDATE_INTERVAL=60
      # 全局 API 速率限制（每分钟）
      - GLOBAL_API_RATE_LIMIT=120
      # Redis 缓存（可选，暂不启用）
      # - REDIS_CONN_STRING=redis://redis:6379
      # 前端基础URL（部署到公网时修改）
      - SERVER_ADDRESS=http://localhost:3000
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
